<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>1/16 Interaction - Russian Roulette Added</title>
  <style>
    /* ==== 1. 반응형 변수 및 기본 설정 ==== */
    :root {
      --radius: 160px; --center-size: 120px; --small-size: 40px;
      --color-center: #BBBBBB; --color-small: #D0D0D0; --color-dot: #888888;
    }
    @media (max-width: 600px) {
      :root { --radius: 110px; --center-size: 90px; --small-size: 38px; }
      #fraction-box { transform: translateY(-30px); }
      .char { font-size: 5rem !important; } .char.top { font-size: 4rem !important; transform: translateY(-1rem); }
      .char.slash { font-size: 6rem !important; } .char.bottom { font-size: 4rem !important; transform: translateY(1rem); }
      .pointer { top: -140px !important; } 
    }
    body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #FFFFFF; overflow: hidden; font-family: serif; touch-action: none; }

    /* 화면 흔들림/피격 효과용 오버레이 */
    #flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; pointer-events: none; z-index: 9999; }

    /* ==== 2. 공통 UI 디자인 ==== */
    #fraction-box { font-weight: bold; cursor: pointer; display: flex; align-items: center; z-index: 50; user-select: none; }
    .char { display: inline-block; font-size: 8rem; } .char.top { font-size: 6rem; transform: translateY(-2rem); }
    .char.slash { font-size: 9rem; margin: 0 -10px; } .char.bottom { font-size: 6rem; transform: translateY(2rem); }

    #circle-container { position: absolute; top: 50%; left: 50%; display: none; z-index: 10; }
    
    .center-circle {
      position: absolute; top: calc(var(--center-size) / -2); left: calc(var(--center-size) / -2);
      width: var(--center-size); height: var(--center-size); background-color: var(--color-center);
      border-radius: 100px; display: flex; justify-content: center; align-items: center; overflow: hidden;
    }

    /* 패널 공통 */
    .panel { position: absolute; width: 100%; height: 100%; opacity: 0; pointer-events: none; z-index: 20; display: flex; justify-content: center; align-items: center; }

    /* 룰렛, 스위치, OX, MBTI 기존 CSS */
    #roulette-wheel { background: conic-gradient(#FFFFFF 0deg 22.5deg, var(--color-center) 22.5deg 45deg, #FFFFFF 45deg 67.5deg, var(--color-center) 67.5deg 90deg, #FFFFFF 90deg 112.5deg, var(--color-center) 112.5deg 135deg, #FFFFFF 135deg 157.5deg, var(--color-center) 157.5deg 180deg, #FFFFFF 180deg 202.5deg, var(--color-center) 202.5deg 225deg, #FFFFFF 225deg 247.5deg, var(--color-center) 247.5deg 270deg, #FFFFFF 270deg 292.5deg, var(--color-center) 292.5deg 315deg, #FFFFFF 315deg 337.5deg, var(--color-center) 337.5deg 360deg); }
    .pointer { position: absolute; top: -190px; left: -15px; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #333333; opacity: 0; transform: translateY(-20px); z-index: 10; pointer-events: none;}
    #switch-panel { gap: 10px; } .switch-dot { width: 20px; height: 20px; border-radius: 50%; background-color: var(--color-dot); cursor: pointer; }
    #ox-panel { gap: 10px; } .ox-slot { width: 30px; height: 40px; background: #FFF; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #333; }
    #mbti-panel { flex-direction: column; background: #EEE; border-radius: 15px; padding: 10px; box-sizing: border-box; width: 200px; height: 250px; }
    
    /* ==== [새로 추가됨] 러시안룰렛 실린더 CSS ==== */
    .chamber {
      position: absolute; top: 50%; left: 50%;
      width: 14px; height: 14px; background: #333; border-radius: 50%;
      /* CSS 변수를 이용해 16개의 구멍을 원형으로 배치 */
      transform: translate(-50%, -50%) rotate(calc(360deg / 16 * var(--i))) translateY(-35px);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
    }
    .cylinder-center {
      position: absolute; width: 20px; height: 20px; background: #555; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.5);
    }

    /* 작은 원 버튼들 */
    .small-circle { position: absolute; top: calc(var(--small-size) / -2); left: calc(var(--small-size) / -2); width: var(--small-size); height: var(--small-size); background-color: var(--color-small); border-radius: 50%; transform: rotate(var(--deg)) translateY(calc(var(--radius) * -1)); opacity: 0; cursor: pointer; z-index: 20; }
    .extra-circle { pointer-events: none; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; pointer-events: none; z-index: 5; }
    #drag-avatar, #pinball-ball { position: absolute; top: 0; left: 0; width: var(--small-size); height: var(--small-size); background-color: #333333; border-radius: 50%; display: none; z-index: 100; }
    #drag-avatar { cursor: grab; }
  </style>
</head>
<body>

  <div id="flash-overlay"></div>

  <div id="fraction-box">
    <span class="char top" id="n1">1</span><span class="char slash">/</span><span class="char bottom" id="n16">16</span>
  </div>

  <canvas id="main-canvas"></canvas>
  <div id="drag-avatar"></div>
  <div id="pinball-ball"></div>

  <div id="circle-container">
    <div class="center-circle" id="center-node">
      <div id="roulette-wheel" class="panel"></div>
      <div id="switch-panel" class="panel">
        <div class="switch-dot" data-bit="8"></div><div class="switch-dot" data-bit="4"></div><div class="switch-dot" data-bit="2"></div><div class="switch-dot" data-bit="1"></div>
      </div>
      <div id="ox-panel" class="panel">
        <div class="ox-slot" id="ox1">-</div><div class="ox-slot" id="ox2">-</div><div class="ox-slot" id="ox3">-</div><div class="ox-slot" id="ox4">-</div>
      </div>
      <div id="mbti-panel" class="panel">
        <div style="font-size:0.7rem; margin-bottom:10px;">What's your MBTI?</div>
        <div id="mbti-display" style="font-weight:bold; letter-spacing:2px; font-size:1.2rem;">----</div>
      </div>

      <div id="russian-panel" class="panel">
        <div class="cylinder-center"></div>
        </div>
    </div>
    <div class="pointer" id="roulette-pointer"></div>

    <div class="small-circle base-circle" id="m-pinball" style="--deg: 0deg;"></div>
    <div class="small-circle base-circle" id="m-roulette" style="--deg: 45deg;"></div>
    <div class="small-circle base-circle" id="m-ladder" style="--deg: 90deg;"></div>
    <div class="small-circle base-circle" id="m-switch" style="--deg: 135deg;"></div>
    <div class="small-circle base-circle" id="m-lottery" style="--deg: 180deg;"></div>
    <div class="small-circle base-circle" id="m-ox" style="--deg: 225deg;"></div>
    <div class="small-circle base-circle" id="m-mbti" style="--deg: 270deg;"></div>
    <div class="small-circle base-circle" id="m-russian" style="--deg: 315deg;"></div> <div class="small-circle extra-circle" style="--deg: 22.5deg;"></div><div class="small-circle extra-circle" style="--deg: 67.5deg;"></div>
    <div class="small-circle extra-circle" style="--deg: 112.5deg;"></div><div class="small-circle extra-circle" style="--deg: 157.5deg;"></div>
    <div class="small-circle extra-circle" style="--deg: 202.5deg;"></div><div class="small-circle extra-circle" style="--deg: 247.5deg;"></div>
    <div class="small-circle extra-circle" style="--deg: 292.5deg;"></div><div class="small-circle extra-circle" style="--deg: 337.5deg;"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
  
  <script>
    gsap.registerPlugin(Draggable);
    gsap.set(['#drag-avatar', '#pinball-ball'], { xPercent: -50, yPercent: -50 });

    let isPlaying = false, activeMenu = null;
    const isMobile = () => window.innerWidth <= 600; 

    const canvas = document.getElementById('main-canvas'), ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    // 시작 화면
    document.getElementById('fraction-box').addEventListener('click', function(e) {
      e.stopPropagation(); const tl = gsap.timeline();
      tl.to('#n1', { x: isMobile() ? -25 : -35, y: isMobile() ? 50 : 70, rotation: -15, duration: 0.4, ease: 'power2.in' })
        .to('.char', { y: '100vh', rotation: 30, duration: 0.6, stagger: 0.1, ease: 'power1.in' })
        .set(this, { display: 'none' }).set('#circle-container', { display: 'block' })
        .fromTo('#center-node', { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.6, ease: 'back.out(1.7)' })
        .to('.base-circle', { opacity: 1, duration: 0.4, stagger: 0.1, ease: 'power1.out' }, "-=0.2");
    });

    document.body.addEventListener('click', () => { if (isMobile() && !isPlaying && activeMenu) resetAllPreviews(); });
    function resetAllPreviews() {
      if (activeMenu === 'russian') resetRussian();
      // ... (다른 모듈 리셋은 하단 로직에 의해 덮어씌워짐)
    }

    // ==========================================
    // [8] 러시안룰렛 로직 (11시 / 315도) - NEW!
    // ==========================================
    const btnRussian = document.getElementById('m-russian');
    const russianPanel = document.getElementById('russian-panel');

    // 16개의 약실(Chamber) 생성
    for (let i = 0; i < 16; i++) {
      const chamber = document.createElement('div');
      chamber.className = 'chamber';
      chamber.style.setProperty('--i', i);
      russianPanel.appendChild(chamber);
    }

    function previewRussian() {
      gsap.to('.base-circle:not(#m-russian)', { opacity: 0, scale: 0, duration: 0.3 });
      gsap.to('#russian-panel', { opacity: 1, duration: 0.4 });
      gsap.to('#center-node', { backgroundColor: '#888888', duration: 0.4 }); // 리볼버의 차가운 금속 느낌
    }

    function resetRussian() {
      gsap.to('.base-circle', { opacity: 1, scale: 1, duration: 0.3 });
      gsap.to('#russian-panel', { opacity: 0, duration: 0.4 });
      gsap.to('#center-node', { backgroundColor: 'var(--color-center)', duration: 0.4 });
    }

    function executeRussian() {
      isPlaying = true;
      gsap.to(btnRussian, { opacity: 0, duration: 0.2 });

      // 1/16 확률 계산 (0이 나오면 당첨)
      const isBang = Math.floor(Math.random() * 16) === 0;
      
      // 탄창이 최소 4바퀴(1440도) 이상 무작위 회전
      const spinDegree = 1440 + (Math.floor(Math.random() * 16) * 22.5);

      gsap.to(russianPanel, {
        rotation: "+=" + spinDegree,
        duration: 2.5,
        ease: 'power4.out',
        onComplete: () => {
          if (isBang) {
            // [사망] 1/16 확률로 당첨 시 격렬한 연출
            const tl = gsap.timeline();
            tl.to('#flash-overlay', { opacity: 1, backgroundColor: '#E74C3C', duration: 0.05 }) // 피격 섬광
              .to('body', { x: 15, y: -15, yoyo: true, repeat: 7, duration: 0.05 }) // 화면 흔들림 (Screen Shake)
              .to('#flash-overlay', { opacity: 0, duration: 1 })
              .call(() => {
                setTimeout(() => { resetRussian(); isPlaying = false; activeMenu = null; }, 500);
              });
          } else {
            // [생존] 빈 약실일 경우 가벼운 반동
            const tl = gsap.timeline();
            tl.to('#center-node', { scale: 0.9, duration: 0.1, yoyo: true, repeat: 1 }) // 찰칵 반동
              .call(() => {
                setTimeout(() => { resetRussian(); isPlaying = false; activeMenu = null; }, 800);
              });
          }
        }
      });
    }

    btnRussian.addEventListener('mouseenter', () => { if(!isMobile() && !isPlaying) previewRussian(); });
    btnRussian.addEventListener('mouseleave', () => { if(!isMobile() && !isPlaying) resetRussian(); });
    btnRussian.addEventListener('click', (e) => {
      e.stopPropagation();
      if (isPlaying) return;
      if (isMobile()) {
        if (activeMenu !== 'russian') { resetAllPreviews(); previewRussian(); activeMenu = 'russian'; }
        else executeRussian();
      } else { executeRussian(); }
    });


    // ==========================================
    // [기존 코드 생략본 - 다른 모듈들도 모두 정상 작동하도록 연결]
    // * 실제 구현 시 이전 답변에 있던 핀볼, 사다리 등의 함수들을 여기에 그대로 붙여넣으시면 됩니다.
    // * 코드 길이 제한으로 이 답변에서는 중복 코드를 축약했습니다.
    // ==========================================
    
    // resetAllPreviews() 함수에 기존 모듈 추가 연동을 위해 재정의
    document.body.addEventListener('click', () => { if (isMobile() && !isPlaying && activeMenu) { resetRussian(); /* 다른 리셋 함수들도 호출 */ activeMenu = null; } });

  </script>
</body>
</html>
